name: Deploy documentation

on:
  push:
    tags:
      - v1.**
    branches:
      - master
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version to build (e.g. v1.7.1, or "latest" for master)'
        required: false
        default: 'latest'

concurrency:
  group: deploy-documentation
  cancel-in-progress: false

jobs:

  wait_for_runner:
    name: Wait for runner to be online
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Check runner and trigger recovery if needed
      uses: actions/github-script@v7
      with:
        script: |
          const maxWait = 12 * 60 * 1000; // 12 minutes
          const pollInterval = 60 * 1000;  // 60 seconds
          const start = Date.now();

          async function isRunnerOnline() {
            const { data: runners } = await github.rest.actions.listSelfHostedRunnersForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const runner = runners.runners.find(r => r.name === 'vmatldcsdoc-1');
            return runner && runner.status === 'online';
          }

          // First check
          if (await isRunnerOnline()) {
            core.info('Runner is online. Proceeding with deploy.');
            return;
          }

          // Runner is offline — trigger health check workflow to attempt recovery
          core.warning('Runner is offline. Triggering health check workflow for auto-recovery...');
          try {
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'runner_health_check.yml',
              ref: 'master',
            });
            core.info('Health check workflow triggered.');
          } catch (e) {
            core.warning(`Could not trigger health check: ${e.message}`);
          }

          // Poll until runner comes back or timeout
          while (Date.now() - start < maxWait) {
            core.info(`Waiting for runner... (${Math.round((Date.now() - start) / 1000)}s elapsed)`);
            await new Promise(r => setTimeout(r, pollInterval));
            if (await isRunnerOnline()) {
              core.info('Runner is back online!');
              return;
            }
          }

          core.setFailed('Runner did not come online within 12 minutes.');

  build_deploy:
    name: Build and deploy documentation
    needs: [wait_for_runner]
    runs-on:
      - self-hosted
      - vmatldcsdoc-1
    timeout-minutes: 30
    env:
      PATH: /usr/local/bin:/usr/local/sbin:/usr/bin:/usr/sbin:/bin:/sbin

    steps:

    - uses: actions/checkout@v4

    - name: Define version name
      run: |
        if [ -n "${{ github.event.inputs.version_name }}" ]; then
          echo "VERSION_NAME=${{ github.event.inputs.version_name }}" >> $GITHUB_ENV
        elif [ "${{ startsWith(github.ref_name, 'v1.') }}" = "true" ]; then
          echo "VERSION_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
        else
          echo "VERSION_NAME=latest" >> $GITHUB_ENV
        fi

    - name: Verify version's name
      run: |
        echo 'Version to build: ${{ env.VERSION_NAME }}'

    - name: Install dependencies
      run: |
        echo "${GITHUB_WORKSPACE}/"
        cd "${GITHUB_WORKSPACE}/"
        python3 -m pip install --user -r ./Documentation/requirements.txt

    - name: Create new folder
      run: |
        echo "Creating new folder ${{ env.VERSION_NAME }}"
        mkdir -p /home/quasar/quasar/${{ env.VERSION_NAME }}

    - name: Build HTML documentation
      run: |
        cd "${GITHUB_WORKSPACE}/Documentation"
        export SPHINXBUILD=`which sphinx-build`
        sphinx-build -b html ./source ./_build/${{ env.VERSION_NAME }}

    - name: Build documentation PDF as ePUB
      run: |
        cd "${GITHUB_WORKSPACE}/Documentation"
        export SPHINXBUILD=`which sphinx-build`

        make epub
        cp ./build/epub/quasar.epub ./_build/${{ env.VERSION_NAME }}
        mv ./_build/${{ env.VERSION_NAME }}/quasar.epub ./_build/${{ env.VERSION_NAME }}/quasar\ ${{ env.VERSION_NAME }}.epub

        make latexpdf
        cp ./build/latex/quasar.pdf ./_build/${{ env.VERSION_NAME }}
        mv ./_build/${{ env.VERSION_NAME }}/quasar.pdf ./_build/${{ env.VERSION_NAME }}/quasar\ ${{ env.VERSION_NAME }}.pdf

    - name: Update server
      run: |
        echo 'Change directory location to build html'
        cd "${GITHUB_WORKSPACE}/Documentation/_build/${{ env.VERSION_NAME }}"

        echo 'Removing old build'
        rm -rf /home/quasar/quasar/${{ env.VERSION_NAME }}
        echo "${{ secrets.QUASAR_PASS }}" | sudo -S rm -rf /usr/share/nginx/quasar/${{ env.VERSION_NAME }}

        echo 'Copying new build to local'
        mkdir -p /home/quasar/quasar/${{ env.VERSION_NAME }}
        cp -a . /home/quasar/quasar/${{ env.VERSION_NAME }}/

        echo "${{ secrets.QUASAR_PASS }}" | sudo -S mkdir -p /usr/share/nginx/quasar/${{ env.VERSION_NAME }}
        if [ "${{ startsWith(github.ref_name, 'v1.') }}" = "true" ]; then
          echo 'Copying to version folder'
          sudo cp -r /home/quasar/quasar/${{ env.VERSION_NAME }} /usr/share/nginx/quasar/version
        else
          echo 'Copying to latest folder'
          sudo cp -r /home/quasar/quasar/${{ env.VERSION_NAME }} /usr/share/nginx/quasar
        fi

        echo 'Reloading nginx'
        echo "${{ secrets.QUASAR_PASS }}" | sudo -S nginx -s reload

    - name: Update latest
      if: ${{ startsWith(github.ref_name, 'v1.') != true }}
      run: |
        echo 'Change directory location to build html'
        cd "${GITHUB_WORKSPACE}/Documentation/_build/${{ env.VERSION_NAME }}"

        echo 'Removing old build'
        rm -rf /home/quasar/quasar/latest
        echo "${{ secrets.QUASAR_PASS }}" | sudo -S rm -rf /usr/share/nginx/quasar/latest

        echo 'Copying new build to local'
        mkdir -p /home/quasar/quasar/latest
        cp -a . /home/quasar/quasar/latest/

        echo 'Copying to nginx folder'
        echo "${{ secrets.QUASAR_PASS }}" | sudo -S mkdir -p /usr/share/nginx/quasar/latest
        sudo cp -r /home/quasar/quasar/latest /usr/share/nginx/quasar

        echo 'Reloading nginx'
        echo "${{ secrets.QUASAR_PASS }}" | sudo -S nginx -s reload

    - name: Update versions
      run: |
        cd "${GITHUB_WORKSPACE}"
        QUASAR_PASS="${{ secrets.QUASAR_PASS }}" python3 ./Documentation/tools/update_versions.py

    - name: Update EOS web site
      continue-on-error: true
      run: |
        cd "${GITHUB_WORKSPACE}/Documentation/_build/${{ env.VERSION_NAME }}"

        echo 'Copying new build to EOS'
        cp -a . /eos/project-q/quasar/www/
        rm -rf /eos/project-q/quasar/www/version
        cp -r /usr/share/nginx/quasar/version /eos/project-q/quasar/www

  retry_deploy:
    name: Retry deploy after transient failure
    needs: [build_deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
    - name: Wait and re-trigger
      uses: actions/github-script@v7
      with:
        script: |
          core.info('Deploy failed. Waiting 5 minutes before retry...');
          await new Promise(r => setTimeout(r, 5 * 60 * 1000));

          core.info('Re-triggering deploy workflow...');
          const ref = context.ref.replace('refs/heads/', '').replace('refs/tags/', '');
          const isTag = context.ref.startsWith('refs/tags/');

          await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'deploy_documentation.yml',
            ref: 'master',
            inputs: {
              version_name: isTag ? ref : 'latest'
            }
          });
          core.info(`Retry triggered for version: ${isTag ? ref : 'latest'}`);

  notify_on_failure:
    name: Notify on failure
    needs: [build_deploy]
    if: always() && needs.build_deploy.result != 'success'
    runs-on: ubuntu-latest
    steps:
    - name: Create or update GitHub issue
      uses: actions/github-script@v7
      with:
        script: |
          const result = '${{ needs.build_deploy.result }}';
          const ref = context.ref.replace('refs/tags/', '').replace('refs/heads/', '');
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const now = new Date().toISOString().replace('T', ' ').slice(0, 19) + ' UTC';

          let diagnosis = '';
          if (result === 'cancelled') {
            diagnosis = 'The job was **cancelled**, most likely because the self-hosted runner `vmatldcsdoc-1` is offline or its GitHub registration expired. The job queued until it timed out.';
          } else if (result === 'failure') {
            diagnosis = 'The job **failed** during execution. Check the [workflow run logs](' + runUrl + ') for the specific step that failed.';
          } else if (result === 'skipped') {
            diagnosis = 'The job was **skipped** because the runner pre-flight check failed — the runner did not come online within 12 minutes despite auto-recovery attempts.';
          } else {
            diagnosis = `The job ended with status **${result}**.`;
          }

          const title = `Documentation deploy failed for ${ref}`;
          const body = [
            `@parasxos — the documentation deployment for **${ref}** did not succeed.`,
            '',
            'A retry has been automatically triggered. If it also fails, manual intervention is needed.',
            '',
            `| Detail | Value |`,
            `|--------|-------|`,
            `| **Version** | \`${ref}\` |`,
            `| **Result** | \`${result}\` |`,
            `| **Time** | ${now} |`,
            `| **Run** | [View logs](${runUrl}) |`,
            '',
            `### What happened`,
            '',
            diagnosis,
            '',
            `### How to fix`,
            '',
            `**1. Check if the runner is alive:**`,
            '```bash',
            'ssh vmatldcsdoc-1',
            'sudo systemctl status actions.runner.quasar-team-quasar.vmatldcsdoc-1.service',
            'journalctl -t quasar-runner-watchdog --since "1 hour ago"',
            '```',
            '',
            `**2. Restart the runner if it's down:**`,
            '```bash',
            'sudo systemctl restart actions.runner.quasar-team-quasar.vmatldcsdoc-1.service',
            '```',
            '',
            `**3. Re-run this build** from the [Actions tab](${runUrl}), or use the CLI:`,
            '```bash',
            `gh run rerun ${context.runId}`,
            '```',
            '',
            `**4. If the runner registration expired** (offline > 30 days), re-register:`,
            '```bash',
            'sudo -u quasar bash',
            'cd /home/quasar/actions-runner',
            './config.sh remove --token $(gh api repos/quasar-team/quasar/actions/runners/registration-token -X POST --jq .token)',
            './config.sh --url https://github.com/quasar-team/quasar --token <NEW_TOKEN> --name vmatldcsdoc-1 --labels self-hosted,vmatldcsdoc-1 --unattended',
            'exit',
            'sudo systemctl restart actions.runner.quasar-team-quasar.vmatldcsdoc-1.service',
            '```',
            '',
            '_This issue will be auto-closed by the health check when the runner comes back online._',
          ].join('\n');

          const { data: issues } = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: 'docs-deploy-failure',
            per_page: 1
          });
          if (issues.length > 0) {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issues[0].number,
              body: body
            });
          } else {
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['docs-deploy-failure'],
              assignees: ['parasxos']
            });
          }

    - name: Send email notification
      if: always()
      uses: dawidd6/action-send-mail@v3
      continue-on-error: true
      with:
        server_address: ${{ secrets.SMTP_SERVER || 'smtp.cern.ch' }}
        server_port: 587
        secure: true
        username: ${{ secrets.SMTP_USERNAME }}
        password: ${{ secrets.SMTP_PASSWORD }}
        subject: "quasar docs deploy FAILED — ${{ github.ref_name }}"
        to: paris.moschovakos@cern.ch
        from: quasar-docs-ci@cern.ch
        body: |
          Hi Paris,

          The documentation deployment for ${{ github.ref_name }} did not succeed.
          A retry has been automatically triggered.

          Result:  ${{ needs.build_deploy.result }}
          Time:    ${{ github.event.head_commit.timestamp || github.event.created_at }}
          Run:     https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

          If the runner is offline, the auto-recovery system should handle it.
          If you're seeing this repeatedly, SSH into vmatldcsdoc-1 and check:

            sudo systemctl status actions.runner.quasar-team-quasar.vmatldcsdoc-1.service
            journalctl -t quasar-runner-watchdog --since "1 hour ago"

          -- quasar CI
