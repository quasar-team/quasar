    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: >
          .CI/run_test_case.py
          --opcua_backend o6
          --open62541_compat_branch ${{ env.OPEN62541_COMPAT_VERSION }}
          --design .CI/test_cases/test_calculated_variables/Design.xml
          --config .CI/test_cases/test_calculated_variables/config.xml
          --compare_with_nodeset .CI/test_cases/test_calculated_variables/reference_ns2.xml

  o6_defaulted_instance_name:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/quasar-team/quasar-uasdk:latest
