    container:
      image: ghcr.io/quasar-team/quasar-uasdk:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: >
          .CI/run_test_case.py
          --opcua_backend o6
          --open62541_compat_branch ${{ env.OPEN62541_COMPAT_VERSION }}
          --design .CI/test_cases/test_single_variable_node/Design.xml
          --generate_all_devices
          --config .CI/test_cases/test_single_variable_node/config.xml

  o6_methods:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/quasar-team/quasar-uasdk:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: >
          .CI/run_test_case.py
          --opcua_backend o6
