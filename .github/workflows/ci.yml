name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  OPEN62541_COMPAT_VERSION: v1.4.3-rc0

jobs:

  # ── open62541 tests ──────────────────────────────────────────────────

  o6_default_design:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/quasar-team/quasar-uasdk:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: >
          .CI/run_test_case.py
          --opcua_backend o6
          --open62541_compat_branch ${{ env.OPEN62541_COMPAT_VERSION }}
          --compare_with_nodeset .CI/test_cases/test_default_quasar_design/reference_ns2.xml

  o6_cache_variables:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/quasar-team/quasar-uasdk:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: |
          mkdir -p Device/include Device/src
          cp .CI/test_cases/test_cache_variables/DTestClass.test.h Device/include/DTestClass.h
          cp .CI/test_cases/test_cache_variables/DTestClass.test.cpp Device/src/DTestClass.cpp
      - run: >
          .CI/run_test_case.py
          --opcua_backend o6
          --open62541_compat_branch ${{ env.OPEN62541_COMPAT_VERSION }}
          --design .CI/test_cases/test_cache_variables/Design.xml
          --config .CI/test_cases/test_cache_variables/config.xml
          --compare_with_nodeset .CI/test_cases/test_cache_variables/reference_ns2.xml

  o6_recurrent_hasobjects:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/quasar-team/quasar-uasdk:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: >
          .CI/run_test_case.py
          --opcua_backend o6
          --open62541_compat_branch ${{ env.OPEN62541_COMPAT_VERSION }}
          --design .CI/test_cases/test_recurrent_hasobjects/Design.xml
          --generate_all_devices
          --config .CI/test_cases/test_recurrent_hasobjects/config.xml

  o6_single_variable_node:
