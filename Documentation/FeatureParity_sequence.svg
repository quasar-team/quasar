<svg xmlns="http://www.w3.org/2000/svg" width="940" height="600" viewBox="0 0 940 600" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="solid" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#222"/>
    </marker>
    <marker id="open" markerWidth="12" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6" fill="none" stroke="#222" stroke-width="1"/>
    </marker>
  </defs>

  <style>
    .lh   { stroke:#999; stroke-width:1; stroke-dasharray:4 4; }
    .head { fill:#4CAF50; stroke:#2e7d32; stroke-width:1; }
    .htxt { fill:#ffffff; font-size:13px; font-weight:bold; text-anchor:middle; }
    .act  { fill:#eeeeff; stroke:#8888cc; stroke-width:1; }
    .call { stroke:#222; stroke-width:1.5; fill:none; }
    .ret  { stroke:#222; stroke-width:1.2; fill:none; stroke-dasharray:5 4; }
    .self { stroke:#222; stroke-width:1.5; fill:none; }
    .msg  { font-size:12.5px; fill:#111; }
    .msgi { font-size:11.5px; fill:#444; font-style:italic; }
    .note { fill:#fff8d0; stroke:#d4b106; stroke-width:1; }
    .ntxt { font-size:12px; fill:#5a4a00; }
    .title{ font-size:16px; font-weight:bold; fill:#111; text-anchor:middle; }
  </style>

  <text class="title" x="470" y="26">Deferred source-variable read — open62541 backend</text>

  <!-- lifelines -->
  <line class="lh" x1="110" y1="78" x2="110" y2="560"/>
  <line class="lh" x1="360" y1="78" x2="360" y2="560"/>
  <line class="lh" x1="600" y1="78" x2="600" y2="560"/>
  <line class="lh" x1="830" y1="78" x2="830" y2="560"/>

  <!-- heads -->
  <rect class="head" x="40"  y="48" width="140" height="30" rx="4"/>
  <text class="htxt" x="110" y="68">OPC UA client</text>
  <rect class="head" x="262" y="48" width="196" height="30" rx="4"/>
  <text class="htxt" x="360" y="68">open62541 EventLoop thread</text>
  <rect class="head" x="520" y="48" width="160" height="30" rx="4"/>
  <text class="htxt" x="600" y="68">completion queue</text>
  <rect class="head" x="740" y="48" width="180" height="30" rx="4"/>
  <text class="htxt" x="830" y="68">SourceVariables worker</text>

  <!-- activation bars -->
  <rect class="act" x="354" y="100" width="12" height="120"/>   <!-- EventLoop: callback -->
  <rect class="act" x="824" y="150" width="12" height="200"/>   <!-- worker -->
  <rect class="act" x="354" y="392" width="12" height="96"/>    <!-- EventLoop: drain+complete -->

  <!-- 1. client read -->
  <line class="call" x1="110" y1="112" x2="354" y2="112" marker-end="url(#solid)"/>
  <text class="msg"  x="118" y="107">Read request</text>

  <!-- 2. unifiedRead self -->
  <path class="self" d="M366,128 h34 v16 h-32" marker-end="url(#solid)"/>
  <text class="msg"  x="404" y="133">unifiedRead(): beginRead(handle)</text>

  <!-- 3. dispatch to worker -->
  <line class="call" x1="366" y1="162" x2="824" y2="162" marker-end="url(#solid)"/>
  <text class="msg"  x="372" y="157">dispatch device read &#8594; SourceVariables pool</text>

  <!-- 4. exchange/register self -->
  <path class="self" d="M366,182 h34 v16 h-32" marker-end="url(#solid)"/>
  <text class="msg"  x="404" y="187">phase.exchange(Deferred); register block</text>

  <!-- 5. return GoodCompletesAsynchronously -->
  <line class="ret"  x1="354" y1="212" x2="110" y2="212" marker-end="url(#open)"/>
  <text class="msg"  x="118" y="207">GoodCompletesAsynchronously</text>

  <!-- responsiveness note -->
  <rect class="note" x="60" y="236" width="300" height="40" rx="4"/>
  <text class="ntxt" x="72" y="254">endpoint stays responsive &#8212; concurrent</text>
  <text class="ntxt" x="72" y="270">reads, calls and publishes are served</text>

  <!-- 6. device read runs -->
  <path class="self" d="M836,300 h34 v16 h-32" marker-end="url(#solid)"/>
  <text class="msg"  x="700" y="305" text-anchor="end">device read runs (slow I/O)</text>

  <!-- 7. worker pushes to queue -->
  <line class="call" x1="824" y1="338" x2="600" y2="338" marker-end="url(#solid)"/>
  <text class="msg"  x="816" y="333" text-anchor="end">complete(): push block</text>
  <text class="msgi" x="816" y="354" text-anchor="end">worker never calls the stack</text>

  <!-- 8. EventLoop drains -->
  <line class="call" x1="366" y1="408" x2="600" y2="408" marker-end="url(#solid)"/>
  <text class="msg"  x="372" y="403">drain()  &#8212; between run_iterate / 20 ms callback</text>

  <!-- 9. finished block returned -->
  <line class="ret"  x1="600" y1="436" x2="366" y2="436" marker-end="url(#open)"/>
  <text class="msg"  x="372" y="431">finished block (identity-matched)</text>

  <!-- 10. setAsyncReadResult to client -->
  <line class="call" x1="354" y1="470" x2="110" y2="470" marker-end="url(#solid)"/>
  <text class="msg"  x="118" y="465">UA_Server_setAsyncReadResult(value)</text>
  <text class="msgi" x="118" y="486">response delivered on the EventLoop thread</text>
</svg>
